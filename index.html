<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบคัดกรองการได้ยิน - โรงพยาบาลศรีสังวร</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f4f8;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10B981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10B981;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // รายชื่อหน่วยบริการ
        const HOSPITAL_LIST = [
            "รพ. ศรีสังวร", // คงไว้เป็นค่าตั้งต้นหรือทางเลือกหลัก
            "รพ.สต.คลองตาล",
            "รพ.สต.วังลึก",
            "รพ.สต.สามเรือน",
            "รพ.สต.บ้านนา",
            "รพ.สต.วังทอง",
            "รพ.สต.นาขุนไกร",
            "สอ.ต.นาขุนไกร",
            "รพ.สต.เกาะตาเลี้ยง",
            "รพ.สต.บ้านวงฆ้อง",
            "รพ.สต.วัดเกาะ",
            "รพ.สต.บ้านไร่",
            "รพ.สต.ทับผึ้ง",
            "รพ.สต.บ้านซ่าน",
            "รพ.สต.วังใหญ่",
            "รพ.สต.ราวต้นจันทร์"
        ];

        // คำถามและคะแนนตาม CSV
        const QUESTIONS = [
            { id: 'q1', text: 'คุยโทรศัพท์ไม่ชัด', score: 2, key: '(2) คุยโทรศัพท์ไม่ชัด' },
            { id: 'q2', text: 'คุยกับคนมากกว่า 2 คน แล้วฟังไม่เข้าใจ', score: 2, key: '(2) คุย >2 คนไม่เข้าใจ' },
            { id: 'q3', text: 'ต้องขอให้คู่สนทนาพูดซ้ำบ่อยๆ', score: 2, key: '(2) ต้องขอให้พูดซ้ำ' },
            { id: 'q4', text: 'ฟังไม่ชัดในที่มีเสียงรบกวน', score: 2, key: '(2) ที่มีเสียงรบกวนไม่ชัด' },
            { id: 'q5', text: 'ต้องเปิดทีวี/วิทยุ เสียงดังกว่าปกติ', score: 1, key: '(1) เปิดทีวีดัง' },
            { id: 'q6', text: 'รู้สึกเครียดหรือต้องพยายามอย่างมากในการฟัง', score: 1, key: '(1) เครียด/ต้องพยายามฟัง' },
            { id: 'q7', text: 'ตอบไม่ตรงคำถาม', score: 1, key: '(1) ตอบไม่ตรงคำถาม' },
            { id: 'q8', text: 'คนรอบข้างรำคาญที่ท่านได้ยินไม่ชัด', score: 1, key: '(1) คนรอบข้างรำคาญ' },
            { id: 'q9', text: 'ครอบครัวคิดว่าท่านมีปัญหาการได้ยิน', score: 2, key: '(2) ครอบครัวคิดว่ามีปัญหา' },
        ];

        const App = () => {
            const [formData, setFormData] = useState({
                hn: '',
                name: '',
                age: '',
                unit: 'รพ.สต.คลองตาล', // Default ใหม่
                customUnit: '', // สำหรับกรณีเลือก "อื่นๆ"
                phone: '',
                chronic: false, // อาการต่อเนื่อง >= 3 เดือน
                answers: {} // เก็บ true/false ของแต่ละคำถาม
            });

            const [score, setScore] = useState(0);
            const [resultColor, setResultColor] = useState('เขียว');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [statusMessage, setStatusMessage] = useState(null);

            // ฝัง Web App URL ตรงนี้
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8DBcYAlRfa-s6xE_nfuwgNRo1dVb1vEKF-qfwbActy4goFb5kzzSAy9KSrW7bPjKO/exec';

            // คำนวณคะแนนทุกครั้งที่คำตอบเปลี่ยน
            useEffect(() => {
                let currentScore = 0;
                QUESTIONS.forEach(q => {
                    if (formData.answers[q.id]) {
                        currentScore += q.score;
                    }
                });
                setScore(currentScore);

                if (currentScore >= 8) {
                    setResultColor('แดง');
                } else if (currentScore > 0) {
                    setResultColor('เหลือง'); 
                } else {
                    setResultColor('เขียว');
                }
            }, [formData.answers]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleToggleAnswer = (questionId) => {
                setFormData(prev => ({
                    ...prev,
                    answers: {
                        ...prev.answers,
                        [questionId]: !prev.answers[questionId]
                    }
                }));
            };

            const handleChronicChange = () => {
                setFormData(prev => ({ ...prev, chronic: !prev.chronic }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // ตรวจสอบค่าหน่วยบริการ (ถ้าเลือกอื่นๆ ให้ใช้ค่าจากช่องกรอกเอง)
                const finalUnit = formData.unit === 'other' ? formData.customUnit : formData.unit;

                if (formData.unit === 'other' && !finalUnit.trim()) {
                    alert('กรุณาระบุชื่อหน่วยบริการ');
                    return;
                }

                setIsSubmitting(true);
                setStatusMessage(null);

                // เตรียมข้อมูลส่ง
                const payload = new FormData();
                payload.append('HN', formData.hn);
                payload.append('ชื่อ-สกุล', formData.name);
                payload.append('อายุ', formData.age);
                payload.append('รพ.สต./หน่วยบริการ', finalUnit);
                payload.append('เบอร์โทรศัพท์ที่ติดต่อได้', formData.phone);
                payload.append('อาการต่อเนื่อง ≥3 เดือน', formData.chronic ? 'ใช่' : 'ไม่ใช่');
                payload.append('คะแนนรวม', score);
                payload.append('ผลคัดกรอง', resultColor);

                QUESTIONS.forEach(q => {
                    payload.append(q.key, formData.answers[q.id] ? 'ใช่' : 'ไม่ใช่');
                });

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: payload,
                        mode: 'no-cors' 
                    });
                    
                    setStatusMessage({ type: 'success', text: 'บันทึกข้อมูลเรียบร้อยแล้ว!' });
                    
                    setFormData(prev => ({
                        ...prev,
                        hn: '',
                        name: '',
                        age: '',
                        phone: '',
                        chronic: false,
                        answers: {},
                        // unit คงค่าเดิมไว้ เพื่อความสะดวกในการคีย์คนถัดไปในพื้นที่เดิม
                        // customUnit คงค่าเดิมไว้เช่นกัน
                    }));
                    window.scrollTo(0,0);

                } catch (error) {
                    console.error('Error:', error);
                    setStatusMessage({ type: 'error', text: 'เกิดข้อผิดพลาดในการส่งข้อมูล: ' + error.message });
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-6 shadow-lg rounded-b-3xl mb-6">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-2xl font-bold">แบบคัดกรองการได้ยิน</h1>
                                <p className="text-blue-100 text-sm mt-1">โรงพยาบาลศรีสังวร (ENT Dept.)</p>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-2xl mx-auto px-4">
                        {/* Status Message */}
                        {statusMessage && (
                            <div className={`mb-6 p-4 rounded-xl flex items-center gap-3 ${statusMessage.type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                <i className={`fas ${statusMessage.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} text-xl`}></i>
                                <span>{statusMessage.text}</span>
                            </div>
                        )}

                        <form onSubmit={handleSubmit}>
                            {/* Section 1: ข้อมูลทั่วไป */}
                            <div className="bg-white rounded-2xl shadow-sm p-6 mb-6">
                                <h2 className="text-lg font-bold text-blue-800 mb-4 border-b pb-2 flex items-center gap-2">
                                    <i className="fas fa-user-circle"></i> ข้อมูลผู้ป่วย
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">HN</label>
                                        <input required name="hn" value={formData.hn} onChange={handleInputChange} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ระบุ HN" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">อายุ (ปี)</label>
                                        <input required type="number" name="age" value={formData.age} onChange={handleInputChange} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ระบุอายุ" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อ-สกุล</label>
                                        <input required name="name" value={formData.name} onChange={handleInputChange} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ระบุชื่อ-สกุล" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                                        <input required type="tel" name="phone" value={formData.phone} onChange={handleInputChange} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="08x-xxx-xxxx" />
                                    </div>
                                    
                                    {/* ส่วนเลือกหน่วยบริการที่ปรับปรุงใหม่ */}
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">หน่วยบริการ</label>
                                        <select name="unit" value={formData.unit} onChange={handleInputChange} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition mb-2">
                                            {HOSPITAL_LIST.map((hospital, index) => (
                                                <option key={index} value={hospital}>{hospital}</option>
                                            ))}
                                            <option value="other">อื่นๆ (ระบุชื่อเอง)</option>
                                        </select>
                                        
                                        {/* ช่องกรอกกรณีเลือกอื่นๆ */}
                                        {formData.unit === 'other' && (
                                            <input 
                                                required 
                                                name="customUnit" 
                                                value={formData.customUnit} 
                                                onChange={handleInputChange} 
                                                className="w-full p-3 bg-blue-50 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition animate-fade-in" 
                                                placeholder="ระบุชื่อหน่วยบริการ..." 
                                            />
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Section 2: แบบประเมิน */}
                            <div className="bg-white rounded-2xl shadow-sm p-6 mb-6">
                                <h2 className="text-lg font-bold text-blue-800 mb-4 border-b pb-2 flex items-center gap-2">
                                    <i className="fas fa-clipboard-check"></i> แบบประเมิน (เลือกที่ตรงกับอาการ)
                                </h2>
                                <div className="space-y-4">
                                    {QUESTIONS.map((q) => (
                                        <div key={q.id} 
                                            onClick={() => handleToggleAnswer(q.id)}
                                            className={`p-4 rounded-xl border-2 cursor-pointer transition-all flex justify-between items-center ${formData.answers[q.id] ? 'border-blue-500 bg-blue-50' : 'border-gray-100 hover:border-blue-200'}`}
                                        >
                                            <div className="flex-1">
                                                <p className={`font-medium ${formData.answers[q.id] ? 'text-blue-900' : 'text-gray-700'}`}>{q.text}</p>
                                                <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full mt-1 inline-block">คะแนน: {q.score}</span>
                                            </div>
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${formData.answers[q.id] ? 'bg-blue-500 border-blue-500' : 'border-gray-300'}`}>
                                                {formData.answers[q.id] && <i className="fas fa-check text-white text-xs"></i>}
                                            </div>
                                        </div>
                                    ))}

                                    <div className="mt-6 pt-4 border-t border-dashed">
                                        <div 
                                            onClick={handleChronicChange}
                                            className={`p-4 rounded-xl border-2 border-dashed cursor-pointer transition-all flex justify-between items-center ${formData.chronic ? 'border-orange-500 bg-orange-50' : 'border-gray-300 hover:border-orange-300'}`}
                                        >
                                            <div>
                                                <p className="font-bold text-gray-800">มีอาการต่อเนื่องมากกว่า 3 เดือน?</p>
                                                <p className="text-xs text-gray-500">ข้อมูลสำคัญสำหรับการวินิจฉัย</p>
                                            </div>
                                             <div className={`w-12 h-6 rounded-full p-1 transition-colors ${formData.chronic ? 'bg-orange-500' : 'bg-gray-300'}`}>
                                                <div className={`w-4 h-4 bg-white rounded-full shadow-md transform transition-transform ${formData.chronic ? 'translate-x-6' : ''}`}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Section 3: สรุปผล Real-time */}
                            <div className="sticky bottom-4">
                                <div className="bg-gray-900 text-white rounded-2xl shadow-2xl p-4 flex justify-between items-center backdrop-blur-md bg-opacity-90">
                                    <div>
                                        <p className="text-gray-400 text-xs uppercase tracking-wide">คะแนนรวม</p>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-3xl font-bold">{score}</span>
                                            <span className="text-sm text-gray-400">คะแนน</span>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className={`inline-block px-3 py-1 rounded-full text-xs font-bold mb-1 ${
                                            resultColor === 'แดง' ? 'bg-red-500 text-white' : 
                                            resultColor === 'เหลือง' ? 'bg-yellow-500 text-black' : 
                                            'bg-green-500 text-white'
                                        }`}>
                                            ผล: {resultColor}
                                        </div>
                                        <p className="text-xs text-gray-400">
                                            {resultColor === 'แดง' ? 'ควรส่งต่อพบแพทย์เฉพาะทาง' : resultColor === 'เหลือง' ? 'เฝ้าระวัง / นัดติดตาม' : 'การได้ยินปกติ'}
                                        </p>
                                    </div>
                                    <button 
                                        type="submit" 
                                        disabled={isSubmitting}
                                        className={`ml-4 px-6 py-3 rounded-xl font-bold text-white shadow-lg transform active:scale-95 transition-all flex items-center gap-2 ${isSubmitting ? 'bg-gray-600 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500'}`}
                                    >
                                        {isSubmitting ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-paper-plane"></i>}
                                        {isSubmitting ? 'กำลังส่ง...' : 'บันทึก'}
                                    </button>
                                </div>
                            </div>
                        </form>
                        
                        <div className="text-center text-gray-400 text-xs mt-8 mb-4">
                             © 2026 ENT Dept. Srisangwon Hospital <br/> Developed for Dr.Sri (P4P Data Collection)
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
